<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>PreeFree Finance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding:20px;">

  <h2>บันทึกรายการ</h2>

  <form id="financeForm">
    <label>วันที่</label><br>
    <input type="date" name="date" required><br><br>

    <label>ประเภทรายการ</label><br>
    <select name="type">
      <option value="รายรับ">รายรับ</option>
      <option value="รายจ่าย">รายจ่าย</option>
    </select><br><br>

    <label>หมวดหมู่</label><br>
    <input type="text" name="category" required><br><br>

    <label>จำนวนเงิน</label><br>
    <input type="number" name="amount" required><br><br>

    <button type="submit">บันทึก</button>
  </form>

  <p id="status"></p>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyUakxlRkB9yHvcDpQRPDMuUVTWejsOEF5MG1FXf4Neo0VfjhmrY7wkKN6E9EBDKj4fRQ/exec";

    document.getElementById("financeForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const formData = new FormData(this);

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });

      document.getElementById("status").innerText = "บันทึกสำเร็จ ✅";
      this.reset();
    });
  </script>

</body>
</html>
