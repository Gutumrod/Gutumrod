<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>พรี่ฟรีสุดหล่อ Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f0f,#1a0000);
  color:white;
}
.container{padding:30px;}
h1{color:#ff2d2d;}

.cards{
  display:flex;
  gap:20px;
  margin-bottom:30px;
}
.card{
  flex:1;
  background:#111;
  padding:20px;
  border-radius:12px;
  border:1px solid #400;
  text-align:center;
}
.income{color:#00ff88;font-size:26px;}
.expense{color:#ff2d2d;font-size:26px;}
.balance{color:#ffcc00;font-size:26px;}

.form-box{
  background:#111;
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
  border:1px solid #400;
}
input,select{
  padding:8px;
  margin:5px;
  background:#1a1a1a;
  color:white;
  border:1px solid #400;
}
button{
  padding:8px 15px;
  background:#ff2d2d;
  border:none;
  color:white;
  cursor:pointer;
}
button:hover{background:#ff5555;}

.chart-box{
  height:280px;
  background:#111;
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
}

.month-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.month-box{
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid #300;
  font-size:14px;
}
.green{color:#00ff88;}
.red{color:#ff2d2d;}
</style>
</head>
<body>
<div class="container">

<h1>🔥 พรี่ฟรีสุดหล่อ Finance</h1>

<div class="cards">
  <div class="card">
    <h3>รายรับ</h3>
    <div id="income" class="income">0</div>
  </div>
  <div class="card">
    <h3>รายจ่าย</h3>
    <div id="expense" class="expense">0</div>
  </div>
  <div class="card">
    <h3>คงเหลือ</h3>
    <div id="balance" class="balance">0</div>
  </div>
</div>

<div class="form-box">
  <h3>บันทึกรายการ</h3>
  <input type="date" id="date">
  <select id="type">
    <option value="รายรับ">รายรับ</option>
    <option value="รายจ่าย">รายจ่าย</option>
  </select>
  <input type="text" id="category" placeholder="หมวดหมู่">
  <input type="number" id="amount" placeholder="จำนวนเงิน">
  <button onclick="submitData()">+ บันทึก</button>
</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<h3>📦 สรุป 12 เดือน</h3>
<div class="month-grid" id="monthGrid"></div>
<h3 style="margin-top:40px;">📊 รายละเอียดเดือน</h3>
<div class="card" id="monthDetail">
  เลือกเดือนเพื่อดูรายละเอียด
</div>

</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbxi_nvk2MVl_wJIajGfyqyRmTlvAIYFgAzOVCm_n8ohThWUCAZC8TS6HWmQNdqWxDRq/exec";

function submitData(){

  const formData = new FormData();
  formData.append("date", document.getElementById("date").value);
  formData.append("type", document.getElementById("type").value);
  formData.append("category", document.getElementById("category").value);
  formData.append("amount", document.getElementById("amount").value);

  fetch(scriptURL,{
    method:"POST",
    body: formData
  })
  .then(res=>res.text())
  .then(res=>{
    console.log(res);
    alert("บันทึกสำเร็จ");
    loadData();
  })
  .catch(err=>{
    console.error(err);
    alert("Error");
  });

}

function loadData(){
  fetch(scriptURL)
  .then(res=>res.json())
  .then(data=>{

    let income=0;
    let expense=0;

    const monthlyIncome=new Array(12).fill(0);
    const monthlyExpense=new Array(12).fill(0);
    const expenseCategory={};
    const incomeCategory={};

    data.forEach(row=>{
      const type=row[1];
      const amount=parseFloat(row[3])||0;
      const date=new Date(row[0]);
      const month=date.getMonth();
      const category=row[2];

      if(type==="รายรับ"){
        income+=amount;
        monthlyIncome[month]+=amount;
        incomeCategory[category]=(incomeCategory[category]||0)+amount;
      }
      if(type==="รายจ่าย"){
        expense+=amount;
        monthlyExpense[month]+=amount;
        expenseCategory[category]=(expenseCategory[category]||0)+amount;
      }
    });

    document.getElementById("income").innerText=income.toLocaleString();
    document.getElementById("expense").innerText=expense.toLocaleString();
    document.getElementById("balance").innerText=(income-expense).toLocaleString();

    renderChart(monthlyIncome,monthlyExpense);
    renderMonths(monthlyIncome,monthlyExpense);
  });
}

let chart;
function renderChart(incomeData,expenseData){
  const ctx=document.getElementById("chart");
  if(chart)chart.destroy();
  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels:['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'],
      datasets:[
        {label:'รายรับ',data:incomeData,borderColor:'#00ff88',tension:0.4},
        {label:'รายจ่าย',data:expenseData,borderColor:'#ff2d2d',tension:0.4}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'white'}}},
      scales:{
        x:{ticks:{color:'white'}},
        y:{ticks:{color:'white'},beginAtZero:true}
      }
    }
  });
}

function renderMonths(incomeData,expenseData){
  const grid=document.getElementById("monthGrid");
  grid.innerHTML="";
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  for(let i=0;i<12;i++){
    grid.innerHTML+=`
      <div class="month-box" onclick="showMonthDetail(${i})" style="cursor:pointer;">
        <strong>${months[i]}</strong><br>
        <span class="green">+${incomeData[i].toLocaleString()}</span><br>
        <span class="red">-${expenseData[i].toLocaleString()}</span>
      </div>
    `;
  }
}
function showMonthDetail(monthIndex){
  fetch(scriptURL)
  .then(res=>res.json())
  .then(data=>{

    let income=0;
    let expense=0;
    const expenseCategory={};
    const incomeCategory={};

    data.forEach(row=>{
      const type=row[1];
      const amount=parseFloat(row[3])||0;
      const date=new Date(row[0]);
      const month=date.getMonth();
      const category=row[2];

      if(month===monthIndex){

        if(type==="รายรับ"){
          income+=amount;
          incomeCategory[category]=(incomeCategory[category]||0)+amount;
        }

        if(type==="รายจ่าย"){
          expense+=amount;
          expenseCategory[category]=(expenseCategory[category]||0)+amount;
        }

      }
    });

    const topIncome=getTopCategory(incomeCategory);
    const topExpense=getTopCategory(expenseCategory);

    document.getElementById("monthDetail").innerHTML=`
      <h3>เดือนที่เลือก</h3>
      รายรับ: <span class="green">${income.toLocaleString()}</span><br>
      รายจ่าย: <span class="red">${expense.toLocaleString()}</span><br>
      คงเหลือ: ${(income-expense).toLocaleString()}<br><br>
      🏆 รับมากสุด: ${topIncome}<br>
      💀 จ่ายมากสุด: ${topExpense}
    `;
  });
}

function getTopCategory(obj){
  let max=0;
  let name="-";
  for(const key in obj){
    if(obj[key]>max){
      max=obj[key];
      name=key+" ("+obj[key].toLocaleString()+")";
    }
  }
  return name;
}

loadData();
</script>
</body>
</html>
